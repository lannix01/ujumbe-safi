<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Ujumbe Safi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card register">
        <div class="auth-card__header">
          <div class="brand-mark compact">
            <i class="fas fa-user-shield"></i>
          </div>
          <h2>Register</h2>
        </div>
        <div class="links">
          <a href="{{ url_for('login') }}">Login</a>
          <a href="{{ url_for('register') }}" class="active">Register</a>
        </div>
        <form action="{{ url_for('register') }}" method="POST" autocomplete="off" enctype="multipart/form-data">
          <div class="field">
            <label for="fullname"><i class="fas fa-id-card"></i></label>
            <input type="text" name="fullname" placeholder="Full Name" id="fullname" required>
          </div>
          <div class="field">
            <label for="username"><i class="fas fa-user"></i></label>
            <input type="text" name="username" placeholder="Username" id="username" required pattern="[a-zA-Z0-9]+" minlength="3" maxlength="20" title="Username must be alphanumeric and 3-20 characters long.">
          </div>
          <div class="field">
            <label for="password"><i class="fas fa-lock"></i></label>
            <input type="password" name="password" placeholder="Password" id="password" required minlength="6" title="Password must be at least 6 characters long.">
            <button class="password-toggle" type="button" aria-label="Show password" data-target="password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="field">
            <label for="email"><i class="fas fa-envelope"></i></label>
            <input type="email" name="email" placeholder="Email" id="email" required>
          </div>
          <div class="field file-field">
            <label for="profile_pic"><i class="fas fa-image"></i></label>
            <input type="file" name="profile_pic" id="profile_pic" accept="image/*" required>
          </div>
          {% if msg %}
            <div class="msg">{{ msg }}</div>
          {% endif %}
          <input type="submit" value="Create account">
        </form>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  </body>
</html>
