<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Ujumbe Safi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card login">
        <div class="auth-card__header">
          <div class="brand-mark compact">
            <i class="fas fa-key"></i>
          </div>
          <h2>Reset Password</h2>
        </div>
        <form action="{{ url_for('reset_password') }}" method="POST" autocomplete="off">
          <div class="field">
            <label for="username"><i class="fas fa-user"></i></label>
            <input type="text" name="username" placeholder="Username" id="username" required>
          </div>
          <div class="field">
            <label for="email"><i class="fas fa-envelope"></i></label>
            <input type="email" name="email" placeholder="Account email" id="email" required>
          </div>
          <div class="field">
            <label for="password"><i class="fas fa-lock"></i></label>
            <input type="password" name="password" placeholder="New password" id="password" required minlength="6">
            <button class="password-toggle" type="button" aria-label="Show password" data-target="password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          {% if msg %}
            <div class="msg">{{ msg }}</div>
          {% endif %}
          {% if success %}
            <div class="msg success-msg">{{ success }}</div>
          {% endif %}
          <input type="submit" value="Reset password">
        </form>
        <a class="auth-secondary" href="{{ url_for('login') }}">Back to login</a>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  </body>
</html>
